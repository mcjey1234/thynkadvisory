name: Auto Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8408
          script: |
            echo "🚀 Starting deployment..."
            
            cd /home/thynkadv/domains/thynkadvisory.co.ke/public_html
            
            # Check if .git exists, if not clone the repo
            if [ ! -d ".git" ]; then
              echo "📦 Cloning repository..."
              rm -rf ./* 2>/dev/null || true
              git clone git@github.com:mcjey1234/sofellabs-website.git .
            fi
            
            echo "📦 Pulling latest code..."
            git pull origin main
            
            # Set Composer path
            COMPOSER="/home/thynkadv/composer"
            
            echo "📦 Installing dependencies..."
            $COMPOSER install --no-dev --optimize-autoloader
            
            echo "🗄️ Running migrations..."
            php artisan migrate --force
            
            echo "🧹 Clearing cache..."
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            echo "🔒 Setting permissions..."
            chown -R thynkadv:thynkadv storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache
            
            echo "✅ Deployment complete!"